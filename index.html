<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — CRUD Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <header class="header">
    <div class="logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">Task<strong>Flow</strong></span>
    </div>
    <div class="stats-bar">
      <div class="stat"><span id="stat-total">0</span><label>Total</label></div>
      <div class="stat"><span id="stat-pending">0</span><label>Pending</label></div>
      <div class="stat"><span id="stat-done">0</span><label>Done</label></div>
    </div>
  </header>

  <main class="container">

    <!-- CREATE PANEL -->
    <section class="panel panel--create" id="create-panel">
      <div class="panel__label">
        <span class="op-badge op--create">C</span> Create Task
      </div>
      <div class="form-grid">
        <div class="field">
          <label for="task-title">Title <span class="req">*</span></label>
          <input id="task-title" type="text" placeholder="What needs to be done?" autocomplete="off" />
        </div>
        <div class="field">
          <label for="task-desc">Description</label>
          <textarea id="task-desc" placeholder="Add details..." rows="2"></textarea>
        </div>
        <div class="field field--row">
          <div class="field">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="low">🟢 Low</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
          <div class="field">
            <label for="task-due">Due Date</label>
            <input id="task-due" type="date" />
          </div>
        </div>
        <button class="btn btn--primary" id="add-btn" onclick="createTask()">
          <span>＋</span> Add Task
        </button>
      </div>
    </section>

    <!-- READ + FILTER PANEL -->
    <section class="panel panel--list">
      <div class="panel__header">
        <div class="panel__label">
          <span class="op-badge op--read">R</span> Task List
        </div>
        <div class="filters">
          <button class="filter-btn active" data-filter="all" onclick="filterTasks(this,'all')">All</button>
          <button class="filter-btn" data-filter="pending" onclick="filterTasks(this,'pending')">Pending</button>
          <button class="filter-btn" data-filter="completed" onclick="filterTasks(this,'completed')">Completed</button>
        </div>
        <div class="search-wrap">
          <input id="search-input" type="text" placeholder="🔍 Search tasks..." oninput="renderTasks()" />
        </div>
      </div>

      <div id="task-list" class="task-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">📋</div>
          <p>No tasks yet. Create your first task above!</p>
        </div>
      </div>
    </section>

  </main>

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="edit-modal">
      <div class="modal__header">
        <div class="panel__label">
          <span class="op-badge op--update">U</span> Update Task
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="form-grid">
        <input type="hidden" id="edit-id" />
        <div class="field">
          <label for="edit-title">Title <span class="req">*</span></label>
          <input id="edit-title" type="text" placeholder="Task title" autocomplete="off" />
        </div>
        <div class="field">
          <label for="edit-desc">Description</label>
          <textarea id="edit-desc" placeholder="Add details..." rows="2"></textarea>
        </div>
        <div class="field field--row">
          <div class="field">
            <label for="edit-priority">Priority</label>
            <select id="edit-priority">
              <option value="low">🟢 Low</option>
              <option value="medium">🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
          <div class="field">
            <label for="edit-due">Due Date</label>
            <input id="edit-due" type="date" />
          </div>
        </div>
        <div class="field field--row">
          <div class="field">
            <label for="edit-status">Status</label>
            <select id="edit-status">
              <option value="pending">⏳ Pending</option>
              <option value="completed">✅ Completed</option>
            </select>
          </div>
        </div>
        <button class="btn btn--primary" onclick="updateTask()">
          <span>✓</span> Save Changes
        </button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
